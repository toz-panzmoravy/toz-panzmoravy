name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/snake.yml

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.3

      - name: Generate contribution snake SVG
        uses: Platane/snk/svg-only@v3.5.0
        with:
          github_user_name: panzmoravylab
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy snake SVG to output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin output || true

          if git show-ref --verify --quiet refs/remotes/origin/output; then
            git checkout output
            git rm -rf .
          else
            git checkout --orphan output
          fi

          cp -r dist/. .
          git add -A
          git commit -m "Update contribution snake SVG" || exit 0
          git push origin output --force
